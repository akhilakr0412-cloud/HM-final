<!-- ================= FORM CARD ================= -->

<div class="appointment-form-card">

  <h2>📅 Add New Appointment</h2>

  <form>

    <!-- Patient -->
    <div class="form-group">
      <label for="patient" class="required">Patient</label>
      <select
        [(ngModel)]="patient"
        name="patient"
        id="patient"
      >
        <option value="Select" selected>Select</option>
        <option *ngFor="let patient of PatientsArray">
          {{ patient.name }}, ({{ patient.age }}) - {{ patient.gender }}
        </option>
      </select>
    </div>

    <!-- Doctor -->
    <div class="form-group">
      <label for="doctor" class="required">Doctor</label>
      <select
        [(ngModel)]="doctor"
        name="doctor"
        id="doctor"
      >
        <option value="Select" selected>Select</option>
        <option *ngFor="let doctor of DoctorsArray">
          {{ doctor.name }} - {{ doctor.speciality }}
        </option>
      </select>
    </div>

    <!-- Date -->
    <div class="form-group">
      <label for="appointmentDate" class="required">
        Appointment Date
      </label>
      <input
        type="datetime-local"
        [(ngModel)]="appointmentDate"
        name="appointmentDate"
        id="appointmentDate"
        required
      />
    </div>

    <!-- Buttons -->
    <div class="form-buttons">

      <button
        *ngIf="!isEditing"
        type="submit"
        class="btn-add"
        (click)="onAddClick()"
      >
        Add Appointment
      </button>

      <button
        *ngIf="isEditing"
        type="submit"
        class="btn-update"
        (click)="onUpdateClick()"
      >
        Update Appointment
      </button>

      <button
        *ngIf="isEditing"
        type="button"
        class="btn-cancel"
        (click)="onCancelEdit()"
      >
        Cancel
      </button>

    </div>

  </form>
</div>

<!-- ================= TABLE CARD ================= -->

<div class="appointment-table-card">

  <h2>
    Appointments ({{ AppointmentsArray.length }})
  </h2>

  <table>

    <thead>
      <tr>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let appointment of AppointmentsArray">
        <td>{{ appointment.patient }}</td>
        <td>{{ appointment.doctor }}</td>
        <td>
          {{ appointment.appointmentDate | date:'medium' }}
        </td>
        <td>

          <button
            type="button"
            class="btn-edit"
            (click)="onEditAppointment(appointment._id)"
          >
            Edit
          </button>

      
        </td>
        <td>
          <button
            type="button"
            class="btn-delete"
            (click)="onDeleteAppointment(appointment._id)"
          >
            Delete
          </button>
        </td>
      </tr>

      <tr *ngIf="AppointmentsArray.length === 0">
        <td colspan="4" class="empty">
          No appointments found
        </td>
      </tr>

    </tbody>

  </table>

</div>
