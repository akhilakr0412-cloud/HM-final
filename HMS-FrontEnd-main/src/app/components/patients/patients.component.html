<div class="content-wrapper">

  <!-- Add Patient Form -->
  <div class="form-card">

    <h2>🧑‍🤝‍🧑 Add New Patient</h2>

    <form>

      <div class="form-group">
        <label for="name" class="required">Patient Name</label>
        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          id="name"
          placeholder="Enter Patient Name"
          required
        />
      </div>

      <div class="form-group">
        <label for="age" class="required">Age</label>
        <input
          type="number"
          [(ngModel)]="age"
          name="age"
          id="age"
          placeholder="Enter Age"
          required
        />
      </div>

      <div class="form-group">
        <label for="gender" class="required">Gender</label>
        <select
          [(ngModel)]="gender"
          name="gender"
          id="gender"
        >
          <option value="Select">Select</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
          <option value="Prefer not to say">Prefer not to say</option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="btn-group">

        <button
          *ngIf="!isEditing"
          type="submit"
          class="btn add-btn"
          (click)="onAddClick()"
        >
          ➕ Add Patient
        </button>

        <button
          *ngIf="isEditing"
          type="submit"
          class="btn update-btn"
          (click)="onUpdateClick()"
        >
          ✏️ Update
        </button>

        <button
          *ngIf="isEditing"
          type="button"
          class="btn cancel-btn"
          (click)="onCancelEdit()"
        >
          Cancel
        </button>

      </div>

    </form>

  </div>

  <!-- Patients Table -->
  <div class="table-card">

    <h2>Patients ({{ PatientsArray.length }})</h2>

    <table>

      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Gender</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let patient of PatientsArray">
          <td>{{ patient.name }}</td>
          <td>{{ patient.age }}</td>
          <td>{{ patient.gender }}</td>
          <td>

            <button
              type="button"
              class="action-btn edit-btn"
              (click)="onEditPatient(patient._id)"
            >
              Edit
            </button>

            <button
              type="button"
              class="action-btn delete-btn"
              (click)="onDeletePatient(patient._id)"
            >
              Delete
            </button>

          </td>
        </tr>

        <tr *ngIf="PatientsArray.length === 0">
          <td colspan="4" class="empty">
            No patients found
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>
